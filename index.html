<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ogłoszeniowy - DOJ & Rekrutacja</title>
    <style>
        body { font-family: Arial, sans-serif; background: #18191a; color: #e4e6eb; margin: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Nagłówek i przełącznik użytkowników */
        header { display: flex; justify-content: space-between; align-items: center; background: #242526; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        select, input, button, textarea { padding: 10px; background: #3a3b3c; border: 1px solid #4e4f50; color: #fff; border-radius: 6px; }
        button { cursor: pointer; background: #2d88ff; border: none; font-weight: bold; }
        button:hover { background: #1a73e8; }

        /* Układ główny */
        .main-layout { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .sidebar, .feed, .panel { background: #242526; padding: 20px; border-radius: 8px; }

        /* Kategorie */
        .category-item { padding: 10px; margin-bottom: 5px; background: #3a3b3c; border-radius: 5px; cursor: pointer; }
        .category-item:hover, .category-item.active { background: #4e4f50; border-left: 4px solid #2d88ff; }
        .tag-doj { background: #1b4f72; color: #5adeff; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

        /* Karty Ogłoszeń */
        .card { background: #3a3b3c; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #888; }
        .card.doj { border-left-color: #5adeff; }
        .card.rekrutacja { border-left-color: #2ecc71; }
        .card-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }

        /* Tabela w panelu */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #4e4f50; padding: 10px; text-align: left; }
        th { background: #3a3b3c; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
        .modal-content { background: #242526; padding: 25px; border-radius: 8px; width: 400px; display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2>Portal Ogłoszeniowy</h2>
            <small id="userRoleInfo"></small>
        </div>
        <div>
            <label>Symuluj zalogowanego jako: </label>
            <select id="userSelect" onchange="switchUser()">
                <!-- Genorowane w JS -->
            </select>
            <button onclick="openModal()">+ Dodaj Ogłoszenie</button>
            <button onclick="togglePanel()" style="background: #e67e22;">⚙️ Panel Admina/Zarządzania</button>
        </div>
    </header>

    <div class="main-layout">
        <!-- Panel Boczny z Kategoriami -->
        <div class="sidebar">
            <h3>Kategorie</h3>
            <div class="category-item active" onclick="filterCategory('all')">Wszystkie</div>
            <div class="category-item" onclick="filterCategory('Ogólne')">Ogólne</div>
            <div class="category-item" onclick="filterCategory('Rekrutacja')">📢 Rekrutacja</div>
            <div class="category-item" onclick="filterCategory('Ogłoszenia DOJ')">⚖️ Ogłoszenia DOJ <span class="tag-doj">DOJ</span></div>
        </div>

        <!-- Główna Lista Ogłoszeń -->
        <div>
            <div id="feed" class="feed"></div>

            <!-- Panel Zarządzania / Admina -->
            <div id="adminPanel" class="panel" style="display: none; margin-top: 20px;">
                <h2 id="panelTitle">Panel Zarządzania</h2>
                
                <!-- Sekcja nadawania rang (Widoczna tylko dla Admina) -->
                <div id="roleManagementSection" style="margin-bottom: 30px; display: none;">
                    <h3>Opcja nadawania rangi DOJ (Tylko dla Admina)</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Użytkownik</th>
                                <th>Ranga</th>
                                <th>Akcja (Zmień Rangę)</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>

                <!-- Lista Ogłoszeń w Panelu -->
                <h3>Zarządzanie Ogłoszeniami</h3>
                <p id="panelInfoText" style="color: #aaa; font-size: 14px;"></p>
                <table>
                    <thead>
                        <tr>
                            <th>Tytuł</th>
                            <th>Kategoria</th>
                            <th>Autor</th>
                            <th>Akcje</th>
                        </tr>
                    </thead>
                    <tbody id="announcementsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Dodawania Ogłoszenia -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Nowe Ogłoszenie</h3>
        <input type="text" id="postTitle" placeholder="Tytuł ogłoszenia">
        <select id="postCategory">
            <option value="Ogólne">Ogólne</option>
            <option value="Rekrutacja">📢 Rekrutacja</option>
            <option value="Ogłoszenia DOJ" id="dojOption">⚖️ Ogłoszenia DOJ</option>
        </select>
        <textarea id="postContent" rows="4" placeholder="Treść ogłoszenia..."></textarea>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button onclick="closeModal()" style="background: #555;">Anuluj</button>
            <button onclick="addAnnouncement()">Opublikuj</button>
        </div>
    </div>
</div>

<script>
    // Baza użytkowników
    let users = [
        { id: 1, name: "Jan Kowalski", role: "User" },
        { id: 2, name: "Anna Nowak", role: "DOJ" },
        { id: 3, name: "Piotr Admin", role: "Admin" }
    ];

    let currentUser = users[0];
    let currentCategory = 'all';

    // Baza ogłoszeń
    let announcements = [
        { id: 1, title: "Otwarta rekrutacja do Sądów", category: "Rekrutacja", content: "Zapraszamy do składania podań na stanowiska pomocnicze.", authorId: 2, authorName: "Anna Nowak" },
        { id: 2, title: "Oficjalny Komunikat DOJ", category: "Ogłoszenia DOJ", content: "Wchodzą w życie nowe rozporządzenia prawne.", authorId: 2, authorName: "Anna Nowak" },
        { id: 3, title: "Sprzedam auto", category: "Ogólne", content: "Auto w stanie idealnym, cena do negocjacji.", authorId: 1, authorName: "Jan Kowalski" }
    ];

    function init() {
        renderUserSelect();
        switchUser();
    }

    function renderUserSelect() {
        const select = document.getElementById('userSelect');
        select.innerHTML = '';
        users.forEach(u => {
            select.innerHTML += `<option value="${u.id}">${u.name} (${u.role})</option>`;
        });
        select.value = currentUser.id;
    }

    function switchUser() {
        const selectedId = parseInt(document.getElementById('userSelect').value);
        currentUser = users.find(u => u.id === selectedId);

        document.getElementById('userRoleInfo').innerText = `Ranga: ${currentUser.role}`;

        // Zablokuj/Odblokuj opcję ogłoszeń DOJ w formularzu
        const dojOption = document.getElementById('dojOption');
        if (currentUser.role === 'DOJ' || currentUser.role === 'Admin') {
            dojOption.disabled = false;
            dojOption.innerText = "⚖️ Ogłoszenia DOJ";
        } else {
            dojOption.disabled = true;
            dojOption.innerText = "⚖️ Ogłoszenia DOJ (Tylko dla DOJ)";
        }

        renderFeed();
        renderPanel();
    }

    function filterCategory(cat) {
        currentCategory = cat;
        renderFeed();
    }

    function renderFeed() {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';

        const filtered = announcements.filter(a => currentCategory === 'all' || a.category === currentCategory);

        if(filtered.length === 0) {
            feed.innerHTML = '<p style="color: #aaa;">Brak ogłoszeń w tej kategorii.</p>';
            return;
        }

        filtered.forEach(a => {
            let typeClass = '';
            if (a.category === 'Ogłoszenia DOJ') typeClass = 'doj';
            if (a.category === 'Rekrutacja') typeClass = 'rekrutacja';

            feed.innerHTML += `
                <div class="card ${typeClass}">
                    <div class="card-header">
                        <span>${a.title}</span>
                        <small>[${a.category}]</small>
                    </div>
                    <div>${a.content}</div>
                    <small style="color: #aaa; display:block; margin-top:10px;">Autor: ${a.authorName}</small>
                </div>
            `;
        });
    }

    function renderPanel() {
        const roleSection = document.getElementById('roleManagementSection');
        const infoText = document.getElementById('panelInfoText');
        const tbody = document.getElementById('announcementsTableBody');

        // 1. ZARZĄDZANIE RANGAMI (Widoczne tylko dla Admina)
        if (currentUser.role === 'Admin') {
            roleSection.style.display = 'block';
            renderUserRolesTable();
            infoText.innerText = "Jako Admin widzisz ogłoszenia wszystkich użytkowników.";
        } else {
            roleSection.style.display = 'none';
        }

        // 2. FILTROWANIE W PANELU DLA DOJ
        let visibleAnnouncements = [];
        if (currentUser.role === 'Admin') {
            visibleAnnouncements = announcements; // Admin widzi wszystko
        } else if (currentUser.role === 'DOJ') {
            // Ranga DOJ widzi TYLKO SWOJE ogłoszenia!
            visibleAnnouncements = announcements.filter(a => a.authorId === currentUser.id);
            infoText.innerText = "Jako członek DOJ widzisz w panelu wyłącznie swoje własne ogłoszenia.";
        } else {
            visibleAnnouncements = announcements.filter(a => a.authorId === currentUser.id);
            infoText.innerText = "Widzisz wyłącznie swoje własne ogłoszenia.";
        }

        tbody.innerHTML = '';
        visibleAnnouncements.forEach(a => {
            tbody.innerHTML += `
                <tr>
                    <td>${a.title}</td>
                    <td>${a.category}</td>
                    <td>${a.authorName}</td>
                    <td><button onclick="deleteAnnouncement(${a.id})" style="background: #e74c3c;">Usuń</button></td>
                </tr>
            `;
        });
    }

    function renderUserRolesTable() {
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';
        users.forEach(u => {
            tbody.innerHTML += `
                <tr>
                    <td>${u.name}</td>
                    <td><strong>${u.role}</strong></td>
                    <td>
                        <button onclick="setRole(${u.id}, 'User')" style="background: #555;">Daj User</button>
                        <button onclick="setRole(${u.id}, 'DOJ')" style="background: #1b4f72;">Daj Rangi DOJ</button>
                        <button onclick="setRole(${u.id}, 'Admin')" style="background: #e67e22;">Daj Admin</button>
                    </td>
                </tr>
            `;
        });
    }

    function setRole(userId, newRole) {
        const u = users.find(user => user.id === userId);
        if (u) {
            u.role = newRole;
            renderUserSelect();
            switchUser();
            alert(`Pomyślnie zmieniono rangę użytkownika ${u.name} na ${newRole}`);
        }
    }

    function addAnnouncement() {
        const title = document.getElementById('postTitle').value;
        const category = document.getElementById('postCategory').value;
        const content = document.getElementById('postContent').value;

        if (!title || !content) {
            alert("Uzupełnij tytuł i treść!");
            return;
        }

        // Blokada zabezpieczająca
        if (category === 'Ogłoszenia DOJ' && currentUser.role !== 'DOJ' && currentUser.role !== 'Admin') {
            alert("Nie masz uprawnień (Rangi DOJ), aby publikować w tej kategorii!");
            return;
        }

        announcements.unshift({
            id: Date.now(),
            title: title,
            category: category,
            content: content,
            authorId: currentUser.id,
            authorName: currentUser.name
        });

        closeModal();
        renderFeed();
        renderPanel();

        document.getElementById('postTitle').value = '';
        document.getElementById('postContent').value = '';
    }

    function deleteAnnouncement(id) {
        announcements = announcements.filter(a => a.id !== id);
        renderFeed();
        renderPanel();
    }

    function togglePanel() {
        const p = document.getElementById('adminPanel');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    init();
</script>
</body>
</html>
