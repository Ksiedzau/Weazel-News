<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weazel News | Los Santos</title>
    
    <!-- SDK Supabase (Wersja 2) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        :root {
            --bg-body: #0b0d14; --bg-header: #121520; --bg-card: #181c2b;
            --bg-input: #0f121d; --accent-red: #dc2626; --accent-gold: #f59e0b;
            --text-main: #f3f4f6; --text-muted: #9ca3af; --border-color: #262c40;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; }
        
        header { 
            background-color: var(--bg-header); border-bottom: 3px solid var(--accent-red);
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .brand { display: flex; align-items: center; gap: 8px; font-weight: 900; text-transform: uppercase; font-size: 1.2rem; }
        .brand span { color: var(--accent-red); }

        .nav-links { display: flex; gap: 10px; }
        .nav-btn { background: transparent; color: var(--text-muted); border: none; cursor: pointer; font-weight: 700; text-transform: uppercase; padding: 8px 15px; border-radius: 6px; }
        .nav-btn.active { color: #fff; background: var(--border-color); }

        .auth-box { display: flex; align-items: center; }
        .btn-discord { 
            background: #5865F2; color: #fff; border: none; border-radius: 8px; 
            padding: 10px 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-discord:hover { background: #4752c4; }
        
        .user-info { display: none; align-items: center; gap: 12px; background: var(--bg-card); padding: 5px 15px; border-radius: 30px; border: 1px solid var(--border-color); }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent-red); }
        .user-name { font-weight: 700; font-size: 0.9rem; }
        .btn-logout { background: none; border: none; color: #ef4444; font-size: 0.8rem; font-weight: 800; cursor: pointer; margin-left: 5px; text-transform: uppercase; }

        main { padding: 30px 20px; max-width: 1200px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .page-header { margin-bottom: 25px; border-left: 5px solid var(--accent-red); padding-left: 15px; }
        .page-header h1 { text-transform: uppercase; font-size: 1.8rem; }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; }
        .card h3 { margin-bottom: 10px; color: #fff; }
        .card p { color: var(--text-muted); line-height: 1.5; }
    </style>
</head>
<body>

<header>
    <div class="brand">WEAZEL <span>NEWS</span></div>

    <nav class="nav-links">
        <button class="nav-btn active" onclick="switchTab('news')">Newsy</button>
        <button class="nav-btn" onclick="switchTab('ogloszenia')">Ogłoszenia</button>
        <button id="admin-nav" class="nav-btn" style="display:none; color: var(--accent-gold);" onclick="switchTab('admin')">Panel Redaktora</button>
    </nav>

    <div class="auth-box">
        <button id="btn-login" class="btn-discord">Zaloguj przez Discord</button>
        
        <div id="user-info" class="user-info">
            <img id="user-avatar" class="user-avatar" src="" alt="">
            <span id="user-name" class="user-name">Użytkownik</span>
            <button id="btn-logout" class="btn-logout">Wyloguj</button>
        </div>
    </div>
</header>

<main>
    <section id="news" class="tab-content active">
        <div class="page-header">
            <h1>Najnowsze Wiadomości</h1>
            <p style="color: var(--text-muted)">Co nowego w Los Santos?</p>
        </div>
        <div id="news-container" class="cards-grid">
            <div class="card">
                <h3>Witamy w Weazel News!</h3>
                <p>Zaloguj się, aby uzyskać dostęp do panelu redaktorskiego i publikować własne artykuły.</p>
            </div>
        </div>
    </section>

    <section id="admin" class="tab-content">
        <div class="page-header">
            <h1>Panel Redaktora</h1>
        </div>
        <div class="card" style="max-width: 600px;">
            <p>Tutaj pojawi się formularz dodawania postów po zalogowaniu.</p>
        </div>
    </section>
</main>

<script src="./app.js"></script>
<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
