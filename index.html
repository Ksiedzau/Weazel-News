<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admina</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 0 10px; }
    h2 { border-bottom: 2px solid #ccc; padding-bottom: 5px; margin-top: 30px; }
    form { display: flex; flex-direction: column; gap: 10px; }
    input, textarea, select, button { padding: 8px; font-size: 14px; }
    button { background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>

  <h1>Panel Zarządzania Treścią</h1>

  <!-- FORMULARZ 1: ARTYKUŁY -->
  <h2>Dodaj Artykuł / News</h2>
  <form id="form-article">
    <input type="text" id="art-title" placeholder="Tytuł artykułu" required>
    <input type="text" id="art-target" placeholder="Dla kogo (np. Wszyscy / Kadra)" required>
    <input type="text" id="art-tag" placeholder="Tag (np. Informacja, Ogłoszenie)" required>
    <select id="art-media-type">
      <option value="image">Zdjęcie (URL)</option>
      <option value="video">Wideo (URL)</option>
    </select>
    <input type="url" id="art-media-url" placeholder="Link URL do zdjęcia/wideo" required>
    <textarea id="art-content" placeholder="Treść artykułu..." rows="4" required></textarea>
    <input type="text" id="art-author" placeholder="Autor" required>
    <input type="date" id="art-date" required>
    <button type="submit">Dodaj Artykuł</button>
  </form>

  <!-- FORMULARZ 2: TIKTOKI -->
  <h2>Dodaj TikTok</h2>
  <form id="form-tiktok">
    <input type="text" id="tt-title" placeholder="Tytuł / Nagłówek" required>
    <input type="url" id="tt-url" placeholder="Link do TikToka" required>
    <textarea id="tt-desc" placeholder="Krótki opis" rows="2" required></textarea>
    <input type="text" id="tt-author" placeholder="Autor" required>
    <input type="date" id="tt-date" required>
    <button type="submit">Dodaj TikTok</button>
  </form>

  <!-- FORMULARZ 3: KADRA -->
  <h2>Dodaj Członka Kadry</h2>
  <form id="form-team">
    <input type="text" id="team-name" placeholder="Imię i Nazwisko" required>
    <input type="text" id="team-role" placeholder="Rola / Stanowisko" required>
    <input type="url" id="team-photo" placeholder="Link do zdjęcia (URL)">
    <button type="submit">Dodaj do Kadry</button>
  </form>

  <!-- SKRYPT OBSŁUGUJĄCY ZAPIS DO SUPABASE -->
  <script type="module">
    import { supabase } from './supabase.js';

    // 1. Obsługa Artykułów
    document.getElementById('form-article').addEventListener('submit', async (e) => {
      e.preventDefault();
      const { data, error } = await supabase.from('articles').insert([{
        title: document.getElementById('art-title').value,
        target: document.getElementById('art-target').value,
        tag: document.getElementById('art-tag').value,
        media_type: document.getElementById('art-media-type').value,
        media_url: document.getElementById('art-media-url').value,
        content: document.getElementById('art-content').value,
        author: document.getElementById('art-author').value,
        date: document.getElementById('art-date').value
      }]);

      if (error) alert('Błąd: ' + error.message);
      else { alert('Dodano artykuł!'); e.target.reset(); }
    });

    // 2. Obsługa TikToków
    document.getElementById('form-tiktok').addEventListener('submit', async (e) => {
      e.preventDefault();
      const { data, error } = await supabase.from('tiktoks').insert([{
        title: document.getElementById('tt-title').value,
        url: document.getElementById('tt-url').value,
        desc: document.getElementById('tt-desc').value,
        author: document.getElementById('tt-author').value,
        date: document.getElementById('tt-date').value
      }]);

      if (error) alert('Błąd: ' + error.message);
      else { alert('Dodano TikTok!'); e.target.reset(); }
    });

    // 3. Obsługa Kadry
    document.getElementById('form-team').addEventListener('submit', async (e) => {
      e.preventDefault();
      const { data, error } = await supabase.from('team').insert([{
        name: document.getElementById('team-name').value,
        role: document.getElementById('team-role').value,
        photo: document.getElementById('team-photo').value
      }]);

      if (error) alert('Błąd: ' + error.message);
      else { alert('Dodano osobę do kadry!'); e.target.reset(); }
    });
  </script>
</body>
</html>
